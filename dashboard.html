<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KeyMistry • Progress Dashboard</title>
    <link rel="icon" type="image/x-icon" href="./assets/favicon.png" />

    <meta name="description" content="Track your piano practice progress across songs with the KeyMistry Dashboard." />
    <link rel="canonical" href="https://bumblebee-3.github.io/KeyMistry/dashboard" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="KeyMistry • Progress Dashboard" />
    <meta property="og:description" content="See your guided learning progress, completion %, and recent activity." />
    <meta property="og:url" content="https://bumblebee-3.github.io/KeyMistry/dashboard" />
    <meta property="og:site_name" content="KeyMistry" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="KeyMistry • Progress Dashboard" />
    <meta name="twitter:description" content="See your guided learning progress, completion %, and recent activity." />
    <link rel="stylesheet" href="./css/tailwind.css" />
  </head>
  <body class="min-h-screen bg-gray-950 text-gray-100 antialiased">
    <header class="sticky top-0 z-40 backdrop-blur supports-[backdrop-filter]:bg-gray-900/70 bg-gray-900/80 border-b border-white/10">
      <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
        <a href="./index" class="flex items-center gap-2 text-lg font-semibold tracking-tight">
          <img src="./assets/favicon.png" alt="KeyMistry" class="w-6 h-6 rounded" />
          <span>KeyMistry</span>
        </a>
        <nav class="hidden md:flex items-center gap-6 text-sm opacity-90">
          <a href="./index" class="hover:text-white/90 transition">Home</a>
          <a href="./app" class="hover:text-white/90 transition">App</a>
          <a href="./privacy" class="hover:text-white/90 transition">Privacy</a>
          <a href="./dashboard" class="hover:text-white/90 transition">Dashboard</a>
        </nav>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
      <section class="mb-6">
        <h1 class="text-2xl sm:text-3xl font-bold">Progress Dashboard</h1>
        <p class="text-white/80 mt-2">Your guided learning progress is saved locally on this device. Sort, review, and reset as needed.</p>
      </section>

      <section class="bg-gray-900/60 border border-white/10 rounded-2xl p-4">
        <div class="flex flex-wrap items-center gap-3">
          <label class="text-sm">Sort by</label>
          <select id="sortBy" class="bg-gray-900/60 border border-white/10 rounded-lg px-3 py-2 text-sm">
            <option value="recent">Recently Played</option>
            <option value="completion">Completion</option>
            <option value="title">Title</option>
          </select>
          <button id="resetAll" class="ml-auto px-3 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm">Reset All</button>
          <button id="replayWalkthrough" class="px-3 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm">Replay Walkthrough</button>
        </div>

        <div id="emptyState" class="mt-6 text-center text-white/70 hidden">
          No progress yet. Open the <a class="underline hover:text-white" href="./app">app</a> to start practicing.
        </div>

        <div id="cards" class="mt-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div>
      </section>
    </main>

    <footer class="py-8 border-t border-white/10">
      <div class="max-w-7xl mx-auto px-4 flex items-center justify-between text-sm text-white/70">
        <div class="flex items-center gap-2">
          <img src="./assets/favicon.png" class="w-4 h-4" alt="KM" />
          <span>KeyMistry</span>
        </div>
        <div>© <span id="year"></span></div>
      </div>
    </footer>

    <script type="module" src="./js/dashboard.js"></script>
  </body>
  </html>
